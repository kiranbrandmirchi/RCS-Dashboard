<!DOCTYPE html>
<html><head><title>Supabase Test</title>
<style>body{font-family:monospace;padding:20px;background:#1a1a1a;color:#eee}pre{background:#2a2a2a;padding:12px;border-radius:6px;overflow-x:auto;margin:8px 0;white-space:pre-wrap}.ok{color:#4ade80}.err{color:#f87171}.warn{color:#fbbf24}h2{color:#60a5fa}</style>
</head><body>
<h2>Supabase Connection Test</h2>
<pre id="log">Testing connectivity...</pre>
<script type="module">
const el = document.getElementById('log');
const lines = [];
function log(msg, cls) { lines.push('<span class="'+(cls||'')+'">'+msg+'</span>'); el.innerHTML = lines.join('\n'); }

const url = 'https://svdejhpmqybgwnbknjwz.supabase.co';
const key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2ZGVqaHBtcXliZ3duYmtuand6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NjIxODMsImV4cCI6MjA4NzIzODE4M30.rBOhC5VnD75hURgB8WiAD3VfjrtgCal6sKBwZeoVIzw';

// Test 1: Raw fetch to Supabase REST API
log('Step 1: Testing raw fetch to Supabase REST API...');
try {
  const resp = await fetch(url + '/rest/v1/gads_customers?select=customer_id&limit=1', {
    headers: {
      'apikey': key,
      'Authorization': 'Bearer ' + key,
    }
  });
  const text = await resp.text();
  log('  HTTP Status: ' + resp.status + ' ' + resp.statusText, resp.ok ? 'ok' : 'err');
  log('  Response: ' + text.substring(0, 500), resp.ok ? 'ok' : 'warn');
} catch (e) {
  log('  FAILED: ' + e.message, 'err');
  log('  This means your browser cannot reach Supabase at all.', 'err');
  log('  Possible causes:', 'warn');
  log('  - Supabase project is PAUSED (check dashboard.supabase.com)', 'warn');
  log('  - VPN/firewall/proxy blocking the connection', 'warn');
  log('  - Wrong Supabase URL', 'warn');
}

// Test 2: Check if Supabase health endpoint works
log('\nStep 2: Testing Supabase health endpoint...');
try {
  const resp2 = await fetch(url + '/auth/v1/health');
  const json2 = await resp2.json();
  log('  Auth health: ' + JSON.stringify(json2), 'ok');
} catch (e) {
  log('  Auth health FAILED: ' + e.message, 'err');
}

// Test 3: Try each table with raw fetch
log('\nStep 3: Testing each table...');
const tables = ['gads_customers', 'gads_campaign_daily', 'gads_campaign_status'];
for (const t of tables) {
  try {
    const r = await fetch(url + '/rest/v1/' + t + '?select=*&limit=1', {
      headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
    });
    const d = await r.text();
    if (r.ok) {
      const parsed = JSON.parse(d);
      log('  ' + t + ': ' + r.status + ' - ' + parsed.length + ' rows' + (parsed.length > 0 ? ' | ' + JSON.stringify(parsed[0]).substring(0,200) : ' (empty)'), parsed.length > 0 ? 'ok' : 'warn');
    } else {
      log('  ' + t + ': ' + r.status + ' - ' + d.substring(0, 300), 'err');
    }
  } catch (e) {
    log('  ' + t + ': FETCH FAILED - ' + e.message, 'err');
  }
}

log('\n--- Done ---');
</script>
</body></html>
